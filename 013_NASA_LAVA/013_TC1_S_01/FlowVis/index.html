 \u2014 bottom"}, "kindLabel": {"stream": "Streamlines", "tauw": "Skin-friction C_f"}, "alphas": [10, 15, 20, 25, 30, 33, 34, 35, 36, 37, 38]};
const ITEMS=D.items,VORDER=D.viewOrder,VLAB=D.viewLabel,KLAB=D.kindLabel,ALPHAS=D.alphas;
let mode='sweep',kind='stream',curView=VORDER[0],curAlpha=ALPHAS[0],lbList=[],lbPos=0;
const app=document.getElementById('app'),viewSel=document.getElementById('viewSel'),
      alphaSel=document.getElementById('alphaSel'),countEl=document.getElementById('count');
VORDER.forEach(v=>{const b=document.createElement('button');b.className='tab';b.textContent=VLAB[v]||v;b.dataset.view=v;

ALPHAS.forEach(a=>{const b=document.createElement('button');b.className='tab';b.textContent=a+'°';b.dataset.alpha=a;

document.querySelectorAll('button[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render()});
document.querySelectorAll('button[data-kind]').forEach(b=>b.onclick=()=>{kind=b.dataset.kind;render()});
function kindOk(it){return kind==='both'||it.kind===kind}
function badge(it){return '<span class="badge '+it.kind+'">'+(it.kind==='stream'?'stream':'C_f')+'</span>'}
function card(it){const c=document.createElement('div');c.className='card';
  const img=document.createElement('img');img.loading='lazy';img.src=it.f;img.alt=it.aLabel+' '+it.vLabel;
  const cap=document.createElement('div');cap.className='cap';
  cap.innerHTML='<span><b>&alpha; = '+it.aLabel+'</b> <span class="v">'+it.vLabel+'</span></span>'+badge(it);
  c.appendChild(img);c.appendChild(cap);c.onclick=()=>openLB(it);return c;}
function section(title,list){const s=document.createElement('div');s.className='section';
  if(title){const h=document.createElement('h2');h.innerHTML=title;s.appendChild(h);}
  const g=document.createElement('div');g.className='grid'+(mode==='matrix'?' matrix':'');
  list.forEach(it=>g.appendChild(card(it)));s.appendChild(g);return s;}
function setActive(){
  document.querySelectorAll('button[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  document.querySelectorAll('button[data-kind]').forEach(b=>b.classList.toggle('on',b.dataset.kind===kind));
  viewSel.style.display=mode==='sweep'?'flex':'none';alphaSel.style.display=mode==='alpha'?'flex':'none';
  viewSel.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.view===curView));
  alphaSel.querySelectorAll('button').forEach(b=>b.classList.toggle('on',Number(b.dataset.alpha)===curAlpha));}
function render(){setActive();app.innerHTML='';const k=kind==='both'?'':' &middot; '+(KLAB[kind]||kind);
  if(mode==='sweep'){const l=ITEMS.filter(i=>i.v===curView&&kindOk(i)).sort((x,y)=>x.a-y.a||x.kind.localeCompare(y.kind));
    app.appendChild(section((VLAB[curView]||curView)+' &mdash; AoA sweep'+k,l));countEl.textContent=l.length+' images';}
  else if(mode==='alpha'){const l=ITEMS.filter(i=>i.a===curAlpha&&kindOk(i)).sort((x,y)=>x.vo-y.vo||x.kind.localeCompare(y.kind));
    app.appendChild(section('&alpha; = '+curAlpha+'&deg; &mdash; all views'+k,l));countEl.textContent=l.length+' images';}
  else{let n=0;ALPHAS.forEach(a=>{const l=ITEMS.filter(i=>i.a===a&&kindOk(i)).sort((x,y)=>x.vo-y.vo||x.kind.localeCompare(y.kind));
    n+=l.length;app.appendChild(section('&alpha; = '+a+'&deg;'+k,l));});countEl.textContent=n+' images';}}
const lb=document.getElementById('lb'),lbimg=document.getElementById('lbimg'),lbcap=document.getElementById('lbcap');
function curList(){if(mode==='sweep')return ITEMS.filter(i=>i.v===curView&&kindOk(i)).sort((x,y)=>x.a-y.a||x.kind.localeCompare(y.kind));
  if(mode==='alpha')return ITEMS.filter(i=>i.a===curAlpha&&kindOk(i)).sort((x,y)=>x.vo-y.vo||x.kind.localeCompare(y.kind));
  return ITEMS.filter(kindOk).sort((x,y)=>x.a-y.a||x.vo-y.vo||x.kind.localeCompare(y.kind));}
function openLB(it){lbList=curList();lbPos=Math.max(0,lbList.findIndex(x=>x.f===it.f));showLB();lb.classList.add('open');}
function showLB(){const it=lbList[lbPos];lbimg.src=it.f;
  lbcap.innerHTML='<b>&alpha; = '+it.aLabel+'</b> &middot; '+it.vLabel+' &middot; '+(KLAB[it.kind]||it.kind)+
    ' &nbsp;<small>'+it.f+'  ('+(lbPos+1)+'/'+lbList.length+')</small>';}
function step(d){lbPos=(lbPos+d+lbList.length)%lbList.length;showLB();}
function closeLB(){lb.classList.remove('open');}
lb.querySelector('.x').onclick=closeLB;
lb.querySelector('.prev').onclick=e=>{e.stopPropagation();step(-1)};
lb.querySelector('.next').onclick=e=>{e.stopPropagation();step(1)};
lb.onclick=e=>{if(e.target===lb)closeLB()};
document.addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;
 if(e.key==='Escape')closeLB();else if(e.key==='ArrowLeft')step(-1);else if(e.key==='ArrowRight')step(1);});
document.getElementById('foot').innerHTML='aoa&lt;AoA&gt;_{stream,tauw}_view_0N_&lt;name&gt;.png &middot; '+ITEMS.length+
 ' images &middot; '+ALPHAS.length+' AoA &times; '+VORDER.length+' views &times; 2 types &middot; click any tile to zoom (&larr;/&rarr;/Esc)';
render();
